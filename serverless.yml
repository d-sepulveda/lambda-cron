service: lambda-cron

provider:
  name: aws
  runtime: nodejs24.x
  region: ${env:REGION, 'us-east-1'}
  stage: ${env:STAGE, 'dev'}
  memorySize: 128
  timeout: 30

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true

plugins:
  - serverless-offline

functions:
  cronJob:
    handler: src/index.handler
    description: Scheduled Lambda cron job
    events:
      - schedule:
          rate: rate(1 hour)
          enabled: true
      - http:
          path: /cron
          method: get
