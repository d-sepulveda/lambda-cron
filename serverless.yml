service: lambda-cron

provider:
  name: aws
  runtime: nodejs20.x
  region: ${env:REGION, 'us-east-1'}
  stage: ${env:STAGE, 'dev'}
  memorySize: 128
  timeout: 30

plugins:
  - serverless-plugin-typescript

functions:
  cronJob:
    handler: src/index.handler
    description: Scheduled Lambda cron job
    events:
      - schedule:
          rate: rate(1 hour)
          enabled: true
