service: lambda-cron

provider:
  name: aws
  runtime: nodejs20.x
  region: ${env:REGION, 'us-east-1'}
  stage: ${env:STAGE, 'dev'}
  memorySize: 128
  timeout: 30

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true

functions:
  everyMinute:
    handler: src/lambdas/everyMinute/handler.handler
    description: Runs every minute
    events:
      - schedule:
          rate: rate(1 minute)
          enabled: true

  daily:
    handler: src/lambdas/daily/handler.handler
    description: Runs every day at midnight UTC
    events:
      - schedule:
          rate: cron(0 0 * * ? *)
          enabled: true

  manual:
    handler: src/lambdas/manual/handler.handler
    description: Triggered manually via HTTP
    events:
      - http:
          path: /trigger
          method: get
